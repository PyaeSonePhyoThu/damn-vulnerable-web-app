server {
    listen 80;
    root /app/frontend;
    index index.html;

    # Proxy all backend routes
    location ~ ^/(api|login|logout|register|forgot-password|reset-password|reset)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /login           { proxy_pass http://backend:8000; }
    location = /register        { proxy_pass http://backend:8000; }
    location = /logout          { proxy_pass http://backend:8000; }
    location = /forgot-password { proxy_pass http://backend:8000; }
    location = /reset-password  { proxy_pass http://backend:8000; }

    # Serve uploaded files (SVG XSS lab — VD-SVG)
    location /uploads/ {
        alias /app/backend/uploads/;
        # VULN: VD-SVG — No Content-Type override; SVG served as-is, scripts execute
        add_header X-Content-Type-Options "";
    }

    # VULN: VD-1 — .git partial block
    # /.git/ and /.git/config return 403; all other object/pack files are served.
    # git-dumper reconstructs full repo from the leaked objects. DO NOT deny all.
    location = /.git/        { return 403; }
    location = /.git/config  { return 403; }
    location /.git/ {
        autoindex off;
        alias /app/.git/;
    }

    location / { try_files $uri $uri/ /index.html; }
}
