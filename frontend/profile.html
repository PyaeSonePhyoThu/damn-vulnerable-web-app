<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploitable Bank — Profile</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/dashboard.html" class="navbar-brand">Exploitable<span class="gold"> Bank</span></a>
  <ul class="navbar-nav">
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/transfer.html">Transfer</a></li>
    <li><a href="/profile.html" class="active">Profile</a></li>
    <li><a href="#" onclick="logout()">Sign Out</a></li>
    <li><span class="nav-user" id="nav-user"></span></li>
  </ul>
</nav>

<div class="main-content">
  <div class="page-header">
    <h1>My Profile</h1>
    <p>Manage your account details &nbsp;·&nbsp; Subscription: <span id="sub-badge"></span></p>
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">

    <!-- Profile Update Form -->
    <div class="card">
      <div class="card-header">
        <h2>Account Information</h2>
      </div>

      <div id="alert-box" class="alert" style="display:none;"></div>

      <form id="profile-form">
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" class="form-control">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control">
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" class="form-control">
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="save-btn">
          Save Changes
        </button>
      </form>
    </div>

    <!-- Right column -->
    <div>
      <!-- Avatar Upload -->
      <div class="card">
        <div class="card-header">
          <h2>Avatar Upload</h2>
        </div>

        <div id="avatar-alert" class="alert" style="display:none;"></div>

        <div class="avatar-section">
          <div class="avatar-preview">
            <img id="avatar-img" src="" alt="Avatar" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
          </div>
          <div>
            <p style="font-size:13px;margin-bottom:8px;"><strong>Current avatar:</strong></p>
            <p style="font-size:12px;color:var(--text-light);">
              URL: <a id="avatar-url-link" href="#" target="_blank" style="color:var(--navy);">No avatar</a>
            </p>
          </div>
        </div>

        <object id="avatar-object" data="" type="image/svg+xml"
                style="width:100px;height:100px;border-radius:8px;border:2px solid var(--gold);display:block;margin-bottom:16px;">
        </object>

        <form id="avatar-form" enctype="multipart/form-data">
          <div class="form-group">
            <label for="avatar-file">Upload Profile Picture</label>
            <input type="file" id="avatar-file" class="form-control" accept="*/*">
          </div>
          <button type="submit" class="btn btn-gold btn-block" id="upload-btn">
            Upload Avatar
          </button>
        </form>
      </div>

      <!-- External Statement Fetch -->
      <div class="card">
        <div class="card-header"><h2>Fetch External Document</h2></div>
        <p style="font-size:13px;color:var(--text-light);margin-bottom:12px;">
          Enter a URL to retrieve an external bank statement or document.
        </p>

        <div class="form-group">
          <div style="display:flex;gap:8px;">
            <input type="text" id="ssrf-url" class="form-control"
              placeholder="https://example.com/statement.json">
            <button class="btn btn-primary btn-sm" onclick="doSSRF()">Fetch</button>
          </div>
        </div>
        <pre id="ssrf-result" style="display:none;background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:6px;font-size:11px;overflow:auto;max-height:280px;"></pre>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/profile.js"></script>
<script>
async function doSSRF() {
    const url = document.getElementById('ssrf-url').value.trim();
    const result = document.getElementById('ssrf-result');
    result.style.display = 'block';
    result.textContent = 'Fetching...';
    try {
        const resp = await fetch('/api/fetch-statement?url=' + encodeURIComponent(url), {
            headers: authHeaders()
        });
        const data = await resp.json();
        result.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
        result.textContent = 'Error: ' + e.message;
    }
}
</script>
</body>
</html>
