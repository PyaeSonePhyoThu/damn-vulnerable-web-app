<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploitable Bank — Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/dashboard.html" class="navbar-brand">Exploitable<span class="gold"> Bank</span></a>
  <ul class="navbar-nav">
    <li><a href="/dashboard.html" class="active">Dashboard</a></li>
    <li><a href="/transfer.html">Transfer</a></li>
    <li><a href="/profile.html">Profile</a></li>
    <li><a href="#" onclick="logout()">Sign Out</a></li>
    <li><span class="nav-user" id="nav-user"></span></li>
  </ul>
</nav>

<div class="main-content">
  <div class="page-header">
    <h1>Welcome back, <span id="welcome-name">—</span></h1>
    <p>Subscription tier: <span id="sub-badge"></span></p>
  </div>

  <div class="card-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom:24px;">
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div>
        <div class="stat-label">Total Balance</div>
        <div class="stat-value" id="total-balance">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏦</div>
      <div>
        <div class="stat-label">Accounts</div>
        <div class="stat-value" id="account-count">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📄</div>
      <div>
        <div class="stat-label">PDF Statement</div>
        <div class="stat-value">
          <button class="btn btn-gold btn-sm" id="pdf-btn" onclick="downloadStatement()">Download</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>My Accounts</h2>
      <a href="/transfer.html" class="btn btn-primary btn-sm">+ New Transfer</a>
    </div>
    <div class="card-grid" id="accounts-container">
      <p style="color:var(--text-light);">Loading accounts...</p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>My Cards</h2>
    </div>
    <div id="cards-container">
      <p style="color:var(--text-light);font-size:13px;">Loading cards...</p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Recent Transactions</h2>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>From</th>
            <th>To</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="txn-tbody">
          <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
