<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploitable Bank — Reset Password</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Exploitable<span> Bank</span></h1>
      <p>Reset Your Password</p>
    </div>

    <div id="alert-box" class="alert" style="display:none;"></div>

    <!-- Tab selection -->
    <div style="display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:6px;overflow:hidden;">
      <button id="tab-token" onclick="showTab('token')"
              style="flex:1;padding:10px;border:none;background:var(--navy);color:white;font-size:13px;font-weight:600;cursor:pointer;">
        Token Reset
      </button>
      <button id="tab-otp" onclick="showTab('otp')"
              style="flex:1;padding:10px;border:none;background:var(--border);color:var(--navy);font-size:13px;font-weight:600;cursor:pointer;">
        OTP Verify
      </button>
    </div>

    <!-- Token Reset Form -->
    <div id="panel-token">
      <form id="reset-form">
        <div class="form-group">
          <label for="r-email">Email Address</label>
          <input type="email" id="r-email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="r-token">Reset Token</label>
          <input type="text" id="r-token" class="form-control" placeholder="Enter your reset token" required>
        </div>
        <div class="form-group">
          <label for="r-password">New Password</label>
          <input type="password" id="r-password" class="form-control" placeholder="New password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="reset-btn">
          Reset Password
        </button>
      </form>
    </div>

    <!-- OTP Verify Form -->
    <div id="panel-otp" style="display:none;">
      <form id="otp-verify-form">
        <div class="form-group">
          <label for="o-email">Email Address</label>
          <input type="email" id="o-email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="o-otp">OTP Code</label>
          <input type="text" id="o-otp" class="form-control" placeholder="Enter your OTP">
        </div>
        <button type="submit" class="btn btn-outline btn-block" id="otp-btn">Verify OTP</button>
      </form>

      <div id="otp-success" style="display:none;margin-top:16px;">
        <div class="alert alert-success">OTP verified! Set new password:</div>
        <form id="new-password-form" style="margin-top:12px;">
          <div class="form-group">
            <label for="n-password">New Password</label>
            <input type="password" id="n-password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="np-btn">Set New Password</button>
        </form>
      </div>
    </div>

    <div style="text-align:center; margin-top:18px; font-size:13px;">
      <a href="/forgot-password.html" style="color:var(--navy-light);">← Back</a>
      &nbsp;·&nbsp;
      <a href="/index.html" style="color:var(--navy-light);">Login</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
function showTab(tab) {
    document.getElementById('panel-token').style.display = tab === 'token' ? '' : 'none';
    document.getElementById('panel-otp').style.display   = tab === 'otp'   ? '' : 'none';
    document.getElementById('tab-token').style.background = tab === 'token' ? 'var(--navy)' : 'var(--border)';
    document.getElementById('tab-token').style.color      = tab === 'token' ? 'white' : 'var(--navy)';
    document.getElementById('tab-otp').style.background   = tab === 'otp'   ? 'var(--navy)' : 'var(--border)';
    document.getElementById('tab-otp').style.color        = tab === 'otp'   ? 'white' : 'var(--navy)';
}

window.addEventListener('DOMContentLoaded', function () {
    const email = sessionStorage.getItem('reset_email');
    const otpEmail = sessionStorage.getItem('otp_email');
    if (email) document.getElementById('r-email').value = email;
    if (otpEmail) document.getElementById('o-email').value = otpEmail;
});

document.getElementById('reset-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert('alert-box');

    const email    = document.getElementById('r-email').value.trim();
    const token    = document.getElementById('r-token').value.trim();
    const password = document.getElementById('r-password').value;

    const resp = await fetch('/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, token, password }),
    });
    const data = await resp.json();

    if (!resp.ok) {
        showAlert('alert-box', data.error || 'Reset failed', 'error');
        return;
    }
    showAlert('alert-box', 'Password reset successful! Redirecting to login...', 'success');
    setTimeout(() => window.location.href = '/index.html', 1500);
});

document.getElementById('otp-verify-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert('alert-box');

    const email = document.getElementById('o-email').value.trim();
    const otpRaw = document.getElementById('o-otp').value;
    const otp = otpRaw === '' ? null : otpRaw;

    const resp = await fetch('/reset/verify-otp', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, otp }),
    });
    const data = await resp.json();

    if (!resp.ok) {
        showAlert('alert-box', data.error || 'OTP verification failed', 'error');
        return;
    }

    showAlert('alert-box', 'OTP verified! Now set your new password.', 'success');
    document.getElementById('otp-success').style.display = '';
    document.getElementById('otp-verify-form').style.display = 'none';
});

document.getElementById('new-password-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const password = document.getElementById('n-password').value;
    const email    = document.getElementById('o-email').value.trim();

    const resp = await fetch('/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
    });
    const data = await resp.json();

    if (!resp.ok) {
        showAlert('alert-box', data.error || 'Failed', 'error');
        return;
    }
    showAlert('alert-box', 'Password reset successful!', 'success');
    setTimeout(() => window.location.href = '/index.html', 1500);
});
</script>
</body>
</html>
