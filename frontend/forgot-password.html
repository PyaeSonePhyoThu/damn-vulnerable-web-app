<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VulnBank — Forgot Password</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Vuln<span>Bank</span></h1>
      <p>Account Recovery</p>
    </div>

    <div id="alert-box" class="alert" style="display:none;"></div>

    <!-- Step 1: Email -->
    <div id="step-email">
      <p style="font-size:13px;color:var(--text-light);margin-bottom:20px;">
        Enter your email address to receive a password reset token.
      </p>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="forgot-btn">
          Send Reset Token
        </button>
      </form>
    </div>

    <!-- Step 2: Confirmation -->
    <div id="step-debug" style="display:none;">
      <div class="alert alert-warning">
        <div>
          <strong>Reset token sent.</strong><br>
          <code id="debug-token" style="font-size:13px;word-break:break-all;"></code>
        </div>
      </div>
      <a href="/reset-password.html" class="btn btn-primary btn-block">Continue to Reset Password</a>
    </div>

    <!-- OTP Flow -->
    <div style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
      <p style="font-size:13px;font-weight:600;margin-bottom:12px;">Or use OTP verification:</p>
      <form id="otp-request-form">
        <div class="form-group">
          <label for="otp-email">Email for OTP</label>
          <input type="email" id="otp-email" class="form-control" placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn-outline btn-block btn-sm">Request OTP</button>
      </form>
      <div id="otp-debug" style="display:none;" class="alert alert-warning">
        <strong>OTP sent:</strong> <code id="debug-otp"></code>
      </div>
    </div>

    <div style="text-align:center; margin-top:18px; font-size:13px;">
      <a href="/index.html" style="color:var(--navy-light);">← Back to Login</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert('alert-box');

    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('forgot-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span> Sending...';

    try {
        const resp = await fetch('/forgot-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email }),
        });

        const data = await resp.json();

        if (!resp.ok) {
            showAlert('alert-box', data.error || 'Request failed', 'error');
            return;
        }

        document.getElementById('debug-token').textContent = data.debug_token || '';
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-debug').style.display = 'block';

        sessionStorage.setItem('reset_token', data.debug_token || '');
        sessionStorage.setItem('reset_email', email);
    } catch (err) {
        showAlert('alert-box', 'Network error: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Token';
    }
});

document.getElementById('otp-request-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('otp-email').value.trim();
    if (!email) return;

    const resp = await fetch('/reset/request-otp', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
    });
    const data = await resp.json();

    if (data.debug_otp) {
        document.getElementById('debug-otp').textContent = data.debug_otp;
        document.getElementById('otp-debug').style.display = 'flex';
        sessionStorage.setItem('otp_email', email);
    }
});
</script>
</body>
</html>
