version: '3.8'
services:
  nginx:
    image: nginx:1.21
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/vulnbank.conf:/etc/nginx/conf.d/default.conf
      - ./:/app
      - ./backend/uploads:/app/backend/uploads
    depends_on: [backend]
    networks: [default]

  backend:
    build: ./backend
    expose: ["8000"]
    volumes:
      - ./:/app
      - db_data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
    environment:
      FLASK_DEBUG: "1"
      MONGO_URI: "mongodb://mongo:27017/"
      JWT_SECRET: "secret123"        # VULN: JWT-1
      DB_PATH: "/app/backend/data/vulnbank.db"
    depends_on: [mongo]
    networks:
      - default
      - imds_net   # joins the 169.254.x.x network so it can reach the mock IMDS

  mongo:
    image: mongo:4.4
    expose: ["27017"]
    volumes: [mongo_data:/data/db]
    networks: [default]

  # Internal admin service — NOT proxied by nginx, NOT exposed to the host
  # Students must discover it via SSRF: http://internal-admin:9000/
  # VULN: A10 — reachable only from backend container (server-side)
  internal-admin:
    build: ./internal-admin
    expose: ["9000"]
    networks: [default]

  # Mock AWS EC2 Instance Metadata Service
  # Fixed IP 169.254.169.254 on imds_net — reachable from backend via SSRF
  # VULN: A10 — http://169.254.169.254/latest/meta-data/ returns IAM credentials
  mock-imds:
    build: ./mock-imds
    networks:
      imds_net:
        ipv4_address: 169.254.169.254

networks:
  default:
  imds_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 169.254.169.0/24
          gateway: 169.254.169.1

volumes:
  db_data:
  mongo_data:
